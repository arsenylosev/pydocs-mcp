github_defaults: &github_defaults
  allowed_domains:
    - github.com
  exclude_patterns:
    - '/issues/'
    - '/pull/'
    - '/releases'
    - '/commits'
    - '/actions'
    - '/compare'
  max_pages: 500
  crawl_delay_seconds: 0.3

sources:
  - name: python
    start_urls:
      - https://docs.python.org/3/
    allowed_domains:
      - docs.python.org
    include_patterns:
      - '^https://docs\.python\.org/3/'
    exclude_patterns:
      - '/_sources/'
      - '/genindex.html'
      - '/search.html'
    max_pages: 2000
    crawl_delay_seconds: 0.3

  - name: numpy
    start_urls:
      - https://numpy.org/doc/stable/
    allowed_domains:
      - numpy.org
    include_patterns:
      - '^https://numpy\.org/doc/stable/'
    exclude_patterns:
      - '/_sources/'
      - '/search.html'
    max_pages: 2000
    crawl_delay_seconds: 0.3

  - name: pandas
