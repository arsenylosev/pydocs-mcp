# Python Official Documentation Sources
# This file defines the built-in documentation sources for Python itself.
# For adding external packages, create a pydocs-packages.yaml file in your config directory.

sources:
  - name: python
    start_urls:
      - https://docs.python.org/3/
    allowed_domains:
      - docs.python.org
    include_patterns:
      - '^https://docs\.python\.org/3/'
    exclude_patterns:
      - '/_sources/'
      - '/genindex.html'
      - '/search.html'
      - '/whatsnew/'  # Skip changelog pages
      - '/bugs.html'
      - '/copyright.html'
    max_pages: 3000
    crawl_delay_seconds: 0.2
    user_agent: "pydocs-mcp/0.2 (+https://github.com/arsenylosev/pydocs-mcp)"

  - name: python-tutorial
